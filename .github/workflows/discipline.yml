name: Discipline engine

# Runs the Rules-as-Code (RaC) discipline engine on every push to master
# and every pull request targeting master. Server-side enforcement of the
# 11 binding rules from fsi-app/.claude/skills/sprint-followups-discipline/SKILL.md,
# so a local --no-verify or a missing/disabled commit-msg hook cannot bypass
# the policy. Engine, predicates, and rule modules live in
# fsi-app/.discipline/ (Sprint Foundation Waves 0-2).
#
# Two jobs run independently on the same triggers:
#
#   validate-commits       — executes the engine against the relevant commit(s)
#                            and fails the build on any rule FAIL.
#   test-discipline-engine — executes the unit tests for the engine itself
#                            (predicates + every rule + runner), so a rule
#                            regression is caught before it merges.
#
# Either job failing fails the workflow; PR merge is blocked when this
# workflow is set as a required check (Repo -> Settings -> Branches).

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  validate-commits:
    name: Validate commits against discipline rules
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          # fetch-depth: 0 gives full history so:
          #   - push to master: --commit=$GITHUB_SHA can read the commit + its parents
          #   - pull_request:   origin/<base>..HEAD range resolution works
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Run discipline engine (push to master)
        if: github.event_name == 'push'
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -u
          echo "Validating commit $COMMIT_SHA"
          node fsi-app/.discipline/runner.mjs \
            --mode=ci \
            --commit="$COMMIT_SHA"

      - name: Run discipline engine (pull request)
        if: github.event_name == 'pull_request'
        env:
          # PR head SHA (not the synthetic merge commit) so the engine
          # validates the actual commits the PR proposes to add.
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -u
          # Make sure origin/<base> is resolvable from the checkout. The
          # checkout action gives us refs/remotes/origin/<base> for the
          # target branch on pull_request events, but we re-fetch defensively
          # in case of a force-push between checkout and run.
          git fetch --no-tags origin "$BASE_REF" || true
          RANGE="origin/${BASE_REF}..${HEAD_SHA}"
          echo "Validating commit range $RANGE"
          node fsi-app/.discipline/runner.mjs \
            --mode=ci \
            --range="$RANGE"

  test-discipline-engine:
    name: Discipline engine unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        # The unit tests use fixtures (buildContextFromFixture) and do not
        # shell out to git, so a shallow checkout is sufficient.

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Run discipline test suite
        # PARITY BY CONSTRUCTION (operator ruling 2026-07-04): the test list lives in ONE place —
        # fsi-app/.discipline/run-test-suite.sh — invoked by BOTH this CI job AND the pre-push hook (step 3),
        # so they can never drift. (Previously the two lists were maintained separately and a test present in
        # CI but missing from pre-push let a non-portable import pass locally and only red in CI.)
        run: bash fsi-app/.discipline/run-test-suite.sh

      - name: Invariant-coverage meta-gate (per-invariant wiring of all 6 skills)
        # Fails CI if any skill invariant is neither enforced (by a resolving mechanism)
        # nor exempt-with-reason, or if any anchor/baseline drifted. Makes "wired" non-optional.
        run: node fsi-app/.discipline/governance/invariant-coverage.mjs

  consistency-backstop:
    name: Consistency layer (C3/C4/C5 reality — always-on backstop)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # WHY a standalone job (g1): rule 014 only fires the consistency runner when a commit TOUCHES
    # docs/inventories/*.md, so for the vast majority of commits the C3/C4/C5 reality checks never ran in
    # CI — a structurally vacuous CI leg (a migration added without its inventory row would sail through).
    # This job runs the runner UNCONDITIONALLY on every push/PR and asserts exit 0 OR a valid documented
    # Consistency-Override, via the SAME override-aware primitive rule 014 + the pre-push hook use.
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          # full history so --commit reads the pushed commit and origin/<base>..HEAD resolves for PRs
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Consistency runner (push to master) — override-aware
        if: github.event_name == 'push'
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -u
          node fsi-app/.discipline/consistency/override-check.mjs --commit="$COMMIT_SHA"

      - name: Consistency runner (pull request) — override-aware
        if: github.event_name == 'pull_request'
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -u
          git fetch --no-tags origin "$BASE_REF" || true
          node fsi-app/.discipline/consistency/override-check.mjs --range="origin/${BASE_REF}..${HEAD_SHA}"

  fitness-check:
    name: Fitness functions (application-layer enforcement)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        # Fitness functions scan the working tree at the checked-out SHA;
        # a shallow checkout is sufficient since they do not consult git history.

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: fsi-app/package-lock.json

      - name: Install fsi-app deps (required for F9 tsc invocation)
        # F9 (build-compiles) runs tsc --noEmit; tsc is the fsi-app local devDep.
        # Without npm install, F9 fails to invoke tsc on a fresh CI checkout.
        # Surfaced 2026-05-21 via failed CI on commit cf03400.
        working-directory: fsi-app
        run: npm ci --prefer-offline --no-audit

      - name: Run fitness functions
        # Whole-repo glob + read + check across the F1-F9 function suite.
        # Exit 0 = no violations; exit 1 = at least one violation; exit 2 = engine error.
        # Violations print file:line with the function id, message, and source skill section.
        run: node fsi-app/.discipline/fitness/runner.mjs

      - name: App unit tests requiring npm deps (*.npmtest.mjs)
        # The NAMED exclusion from run-test-suite.sh's no-npm-ci glob (red-merge-class fix,
        # 2026-07-08): tests importing npm deps (jiti for TS module import) run HERE, after
        # npm ci — glob-by-construction, so a new *.npmtest.mjs joins automatically.
        run: |
          files=$(git ls-files 'fsi-app/src/**/*.npmtest.mjs')
          if [ -n "$files" ]; then node --test $files; else echo "no npmtest files"; fi

  rendering-guard:
    name: Rendering guard (overflow / placeholder / hydration — real-browser layout)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # WHY its own job (RENDER-1, 2026-07-11): the overflow leg needs a REAL layout engine
    # (scrollWidth/clientWidth are all-zero in jsdom), so this job installs Playwright chromium and
    # renders the extreme-data fixtures at every app breakpoint tier. Kept OFF the hot no-npm
    # `node --test` suite (it needs a browser) but a REQUIRED signal here — it makes the L-1/L-4/L-6
    # overflow, F-1 placeholder, and V-07 hydration classes build-catchable (invariant
    # SF-10-customer-surface-rendering). The pure detector core is ALSO unit-proven red-then-green in
    # the no-npm suite (fsi-app/.discipline/rendering/assertions.test.mjs), so this job cannot silently
    # pass a broken detector.
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install Playwright + chromium (scoped, not added to package.json)
        working-directory: fsi-app
        run: |
          npm install --no-save playwright@1.61.1 --no-audit --no-fund
          npx playwright install --with-deps chromium

      - name: Run rendering guard (fixtures × breakpoint tiers, real layout measurement)
        working-directory: fsi-app
        run: node .discipline/rendering/run-rendering-guard.mjs
