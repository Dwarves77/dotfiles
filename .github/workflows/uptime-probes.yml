name: Uptime and honesty probes

# Wave-β R0.2 (Runtime Observability). Two independent watches against the
# deployed app:
#
#   1. surfaces  — every 30 min + on demand. Curls /api/health/surfaces and
#                  asserts every must-have customer surface reports ok=true
#                  (backing data present). Customer surfaces are auth-walled,
#                  so this server-side probe is the only external way to catch
#                  a surface that has silently gone empty.
#   2. spend     — daily at 09:00 UTC + on demand. Curls /api/health/spend and
#                  fails if month-to-date agent spend has reached 80% of the
#                  $75 monthly ceiling, so the budget alarm fires with head-
#                  room to react.
#
# ALERTING: this workflow has no external alert integration by design (no
# Sentry/PagerDuty/Slack account — first-party only). The alert channel is
# GitHub's built-in failed-workflow notification: when a run fails, GitHub
# emails the repository owner (and anyone watching Actions). Ensure the repo
# owner's GitHub notification settings have "Actions: workflow runs" email
# enabled. A nonzero exit here == an email to the owner.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   APP_URL       — Production base URL. Value: https://carosledge.com
#                   (the live production domain; no trailing slash).
#   WORKER_SECRET — the app's existing worker secret (the SAME repo secret the
#                   worker routes use). The health endpoints authenticate the
#                   x-worker-secret header against WORKER_SECRET; this workflow
#                   presents that same secret as the header — one value, one
#                   name, no separate probe label. The secret VALUE is never
#                   written into this file or any log — only referenced via
#                   ${{ secrets.WORKER_SECRET }}. (2026-07-12: retired the
#                   invented PROBE_SECRET reference, which named a secret that
#                   was never created — see docs/ops/secrets-topology.md.)
#
# Output discipline (public repo): logs print HTTP status codes, ok booleans,
# and numeric counts only — never row content.

on:
  schedule:
    - cron: '*/30 * * * *'   # surfaces probe, every 30 minutes
    - cron: '0 9 * * *'      # spend watch, daily at 09:00 UTC
  workflow_dispatch:

jobs:
  surfaces:
    name: Surface honesty probe
    # Runs on EVERY trigger (the 30-min cron, the daily spend cron, and manual
    # dispatch). Previously skipped on the daily '0 9' cron, which surfaced as
    # "Surface honesty probe: skipped" whenever the spend watch ran — an
    # unhelpful gap that read as a failure. Surfaces is independent of spend and
    # should always confirm the customer surfaces are backed by real rows.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify required secrets
        env:
          APP_URL: ${{ secrets.APP_URL }}
          WORKER_SECRET: ${{ secrets.WORKER_SECRET }}
        run: |
          missing=0
          if [ -z "$APP_URL" ]; then
            echo "::error::APP_URL secret is not set."
            missing=1
          fi
          if [ -z "$WORKER_SECRET" ]; then
            echo "::error::WORKER_SECRET secret is not set (must equal the app's WORKER_SECRET)."
            missing=1
          fi
          [ "$missing" -eq 0 ]

      - name: Probe /api/health/surfaces
        env:
          APP_URL: ${{ secrets.APP_URL }}
          WORKER_SECRET: ${{ secrets.WORKER_SECRET }}
        run: |
          set -u
          base="${APP_URL%/}"
          target="$base/api/health/surfaces"
          echo "Probing $target"

          tmp_body=$(mktemp)
          status=$(curl -sS -o "$tmp_body" -w "%{http_code}" \
            --max-time 60 \
            --retry 2 --retry-delay 5 --retry-connrefused \
            -H "x-worker-secret: $WORKER_SECRET" \
            "$target") || curl_exit=$?

          echo "HTTP status: $status"

          if [ "${curl_exit:-0}" -ne 0 ]; then
            echo "::error::curl failed with exit code $curl_exit"
            exit "$curl_exit"
          fi

          # Numeric/boolean summary only — never dump full body (no row content).
          overall_ok=$(jq -r '.ok' "$tmp_body" 2>/dev/null || echo "parse_error")
          seed_leak=$(jq -r '.seed_leak' "$tmp_body" 2>/dev/null || echo "parse_error")
          echo "overall ok: $overall_ok"
          echo "seed_leak: $seed_leak"

          echo "Per-surface ok / backing_rows:"
          jq -r '.surfaces | to_entries[] | "  \(.key): ok=\(.value.ok) rows=\(.value.backing_rows)"' \
            "$tmp_body" 2>/dev/null || echo "  (could not parse surfaces)"
          echo "Per-RPC ok:"
          jq -r '.rpcs | to_entries[] | "  \(.key): ok=\(.value.ok)"' \
            "$tmp_body" 2>/dev/null || echo "  (could not parse rpcs)"

          if [ "$status" -ne 200 ]; then
            echo "::error::Surfaces probe returned HTTP $status (expected 200; 503 == a surface is down)."
            exit 1
          fi

          # Assert every MUST-HAVE surface reports ok=true. The endpoint already
          # encodes zero-legal semantics (community/map/*-config may be zero);
          # we re-assert the must-haves here so the workflow fails loudly and
          # names the offender even if the endpoint's own gate ever regresses.
          fail=0
          for s in dashboard regulations market research operations; do
            ok=$(jq -r --arg s "$s" '.surfaces[$s].ok' "$tmp_body" 2>/dev/null)
            if [ "$ok" != "true" ]; then
              echo "::error::Must-have surface '$s' is not ok (ok=$ok)."
              fail=1
            fi
          done

          if [ "$overall_ok" != "true" ]; then
            echo "::error::Overall surfaces health is not ok."
            fail=1
          fi
          if [ "$seed_leak" = "true" ]; then
            echo "::error::seed_leak=true — dashboard is not backed by real rows."
            fail=1
          fi

          [ "$fail" -eq 0 ] && echo "✓ All must-have surfaces ok."
          exit "$fail"

  spend:
    name: Spend watch
    # Runs on the daily 09:00 cron and on manual dispatch; skipped on the
    # 30-min surfaces cron.
    if: github.event.schedule != '*/30 * * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify required secrets
        env:
          APP_URL: ${{ secrets.APP_URL }}
          WORKER_SECRET: ${{ secrets.WORKER_SECRET }}
        run: |
          missing=0
          if [ -z "$APP_URL" ]; then
            echo "::error::APP_URL secret is not set."
            missing=1
          fi
          if [ -z "$WORKER_SECRET" ]; then
            echo "::error::WORKER_SECRET secret is not set (must equal the app's WORKER_SECRET)."
            missing=1
          fi
          [ "$missing" -eq 0 ]

      - name: Probe /api/health/spend
        env:
          APP_URL: ${{ secrets.APP_URL }}
          WORKER_SECRET: ${{ secrets.WORKER_SECRET }}
        run: |
          set -u
          base="${APP_URL%/}"
          target="$base/api/health/spend"
          echo "Probing $target"

          tmp_body=$(mktemp)
          status=$(curl -sS -o "$tmp_body" -w "%{http_code}" \
            --max-time 60 \
            --retry 2 --retry-delay 5 --retry-connrefused \
            -H "x-worker-secret: $WORKER_SECRET" \
            "$target") || curl_exit=$?

          echo "HTTP status: $status"

          if [ "${curl_exit:-0}" -ne 0 ]; then
            echo "::error::curl failed with exit code $curl_exit"
            exit "$curl_exit"
          fi
          if [ "$status" -ne 200 ]; then
            echo "::error::Spend probe returned HTTP $status."
            exit 1
          fi

          # The verdict is computed server-side (spend-health.mjs): a paid row after the acquisition-freeze
          # baseline is OK ONLY in a SANCTIONED window (GROUNDING_ACQUIRE_ENABLED ON + every row carries a
          # pre-logged I2 justification); frozen-and-quiet (zero paid rows since freeze) is also OK. We do
          # NOT alarm on "% of the ceiling" (permanent-red on the frozen ceiling — #293 precedent). FAIL on:
          # a paid row while the lock is OFF (justified-but-lock-off is STILL a leak), an unjustified paid
          # row while the lock is ON, or an unreadable gauge.
          healthy=$(jq -r '.healthy' "$tmp_body" 2>/dev/null || echo "parse_error")
          reason=$(jq -r '.reason' "$tmp_body" 2>/dev/null || echo "?")
          mtd=$(jq -r '.mtd_usd' "$tmp_body" 2>/dev/null || echo "?")
          ceiling=$(jq -r '.monthly_ceiling_usd' "$tmp_body" 2>/dev/null || echo "?")
          pct=$(jq -r '.pct' "$tmp_body" 2>/dev/null || echo "?")
          frozen=$(jq -r '.frozen' "$tmp_body" 2>/dev/null || echo "?")
          lock_on=$(jq -r '.acquire_lock_on' "$tmp_body" 2>/dev/null || echo "?")
          paid_after=$(jq -r '.paid_after_freeze' "$tmp_body" 2>/dev/null || echo "?")
          echo "MTD: \$$mtd of \$$ceiling (pct=$pct%, frozen=$frozen, lock_on=$lock_on, paid_after_freeze=$paid_after)"

          # Enumerate the post-freeze paid rows — operational metadata only (UUIDs, $ figures, the I2
          # justification enum); never brief content. Empty in the frozen-and-quiet state.
          rows_md=$(jq -r '.paid_after_rows[]? | "  - item=\(.item_id // "-") src=\(.source_id // "-") $\(.cost_usd) [\(.justification // "NO-JUSTIFICATION")]"' "$tmp_body" 2>/dev/null)
          if [ -n "$rows_md" ]; then echo "Paid rows since the freeze baseline:"; echo "$rows_md"; fi

          if [ "$healthy" = "parse_error" ] || [ "$healthy" = "null" ] || [ -z "$healthy" ]; then
            echo "::error::Spend gauge unreadable (no health verdict in the response — endpoint old or errored)."
            exit 1
          fi
          if [ "$healthy" != "true" ]; then
            echo "::error::Spend watch RED — $reason"
            {
              echo "### Spend watch — RED ❌"
              echo ""
              echo "- $reason"
              echo "- lock_on=$lock_on · paid_after_freeze=$paid_after"
              [ -n "$rows_md" ] && { echo ""; echo "Paid rows since the freeze baseline:"; echo "$rows_md"; }
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          # Healthy: frozen-and-quiet (paid_after=0) OR a sanctioned window (lock ON + all justified).
          echo "✓ $reason"
          {
            if [ "$paid_after" = "0" ]; then
              echo "### Spend watch — frozen-and-quiet ✓"
            else
              echo "### Spend watch — sanctioned window ✓ (lock ON, all rows pre-justified)"
            fi
            echo ""
            echo "- MTD: \$$mtd of \$$ceiling ceiling (${pct}%), frozen=$frozen, lock_on=$lock_on"
            echo "- Paid rows since the freeze baseline: **$paid_after**"
            echo "- $reason"
            if [ -n "$rows_md" ]; then echo ""; echo "Sanctioned rows:"; echo "$rows_md"; fi
          } >> "$GITHUB_STEP_SUMMARY"
          # Healthy verdict reached above (FAIL/unreadable paths already `exit 1`). Make success
          # explicit so the step's exit status is NOT the trailing test's — a bare `[ -n "$x" ] && …`
          # as the final command returns 1 when $x is empty (the normal frozen-and-quiet state, no
          # rows to enumerate), which false-reds the step AFTER the ✓. That is the exact permanent-red
          # class this probe exists to kill (#301/#302), one layer down in the summary shell.
          exit 0
