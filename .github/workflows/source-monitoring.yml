name: Source monitoring

# Periodically calls /api/worker/check-sources to run the sources accessibility/
# trust check. Replaces the prior vercel.json cron (which was inert: it sent a
# GET to a POST-only auth-required route, with no auth header and no method
# match).
#
# Required secrets (Repo → Settings → Secrets and variables → Actions):
#   APP_URL        — Production base URL, e.g. https://your-app.vercel.app (no trailing slash)
#   WORKER_SECRET  — Same value as the WORKER_SECRET env var on the deployed app
#
# Schedule: every hour. Wave 1a moved the cadence from 6h to 1h because
# the worker now also honors sources.auto_run_enabled (per-source kill
# switch), so the default state post cold-start is "no source eligible"
# and an hourly tick is harmless when the queue is empty. Re-enabled
# sources flow through within an hour. Also runnable on demand from the
# Actions tab via workflow_dispatch.

on:
  schedule:
    - cron: '0 */1 * * *'
  workflow_dispatch:

jobs:
  check-sources:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify required secrets
        env:
          APP_URL: ${{ secrets.APP_URL }}
          WORKER_SECRET: ${{ secrets.WORKER_SECRET }}
        run: |
          missing=0
          if [ -z "$APP_URL" ]; then
            echo "::error::APP_URL secret is not set. Add it in repo Settings → Secrets and variables → Actions."
            missing=1
          fi
          if [ -z "$WORKER_SECRET" ]; then
            echo "::error::WORKER_SECRET secret is not set. Add it in repo Settings → Secrets and variables → Actions."
            missing=1
          fi
          [ "$missing" -eq 0 ]

      - name: Call /api/worker/check-sources
        env:
          APP_URL: ${{ secrets.APP_URL }}
          WORKER_SECRET: ${{ secrets.WORKER_SECRET }}
        run: |
          set -u
          # Strip any trailing slash from APP_URL to normalise the join.
          base="${APP_URL%/}"
          target="$base/api/worker/check-sources"

          echo "Calling $target"

          # Capture body and status separately. We POST with the worker secret
          # header that the route expects (see src/app/api/worker/check-sources/route.ts).
          tmp_body=$(mktemp)
          status=$(curl -sS -o "$tmp_body" -w "%{http_code}" \
            --max-time 60 \
            --retry 2 --retry-delay 5 --retry-connrefused \
            -X POST \
            -H "x-worker-secret: $WORKER_SECRET" \
            -H "Content-Type: application/json" \
            "$target") || curl_exit=$?

          echo "HTTP status: $status"
          echo "Response body:"
          cat "$tmp_body"
          echo

          if [ "${curl_exit:-0}" -ne 0 ]; then
            echo "::error::curl failed with exit code $curl_exit"
            exit "$curl_exit"
          fi

          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "::error::Worker returned non-2xx status: $status"
            exit 1
          fi

          echo "✓ Worker check completed successfully."

  drain-first-fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Run after check-sources so a single cron tick exercises both
    # paths. Independent failure: drain-first-fetch failing does not
    # roll back check-sources.
    needs: check-sources
    if: always()
    steps:
      - name: Verify required secrets
        env:
          APP_URL: ${{ secrets.APP_URL }}
          WORKER_SECRET: ${{ secrets.WORKER_SECRET }}
        run: |
          missing=0
          if [ -z "$APP_URL" ]; then
            echo "::error::APP_URL secret is not set."
            missing=1
          fi
          if [ -z "$WORKER_SECRET" ]; then
            echo "::error::WORKER_SECRET secret is not set."
            missing=1
          fi
          [ "$missing" -eq 0 ]

      - name: Call /api/worker/drain-first-fetch
        env:
          APP_URL: ${{ secrets.APP_URL }}
          WORKER_SECRET: ${{ secrets.WORKER_SECRET }}
        run: |
          set -u
          base="${APP_URL%/}"
          target="$base/api/worker/drain-first-fetch"

          echo "Calling $target"

          # Wave 1b: drain pending_first_fetch queue. Default per-call
          # limit is 5 sources (env DRAIN_FIRST_FETCH_LIMIT on the app
          # can override). 12 newly-registered sources finish in 3
          # cron ticks at the default limit per design doc Section
          # "Bulk-add handling".
          tmp_body=$(mktemp)
          status=$(curl -sS -o "$tmp_body" -w "%{http_code}" \
            --max-time 300 \
            --retry 1 --retry-delay 5 --retry-connrefused \
            -X POST \
            -H "x-worker-secret: $WORKER_SECRET" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "$target") || curl_exit=$?

          echo "HTTP status: $status"
          echo "Response body:"
          cat "$tmp_body"
          echo

          if [ "${curl_exit:-0}" -ne 0 ]; then
            echo "::error::curl failed with exit code $curl_exit"
            exit "$curl_exit"
          fi

          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "::error::Drain worker returned non-2xx status: $status"
            exit 1
          fi

          echo "✓ Drain worker completed successfully."
